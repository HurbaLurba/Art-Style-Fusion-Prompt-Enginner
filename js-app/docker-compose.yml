services:
  art-style-fusion:
    build: .
    container_name: art-style-fusion-app
    ports:
      - "7633:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
      NODE_ENV: production
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/config',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - art-fusion-network

networks:
  art-fusion-network:
    driver: bridge
